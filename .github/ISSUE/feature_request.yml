name: Feature Request
description: Suggest an idea for GLaunch
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Share what problem you're trying to solve. Feature requests help shape the roadmap.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point does this address?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like GLaunch to handle it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other products you've tried?

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your perspective)
      options:
        - Nice to have
        - Would improve my workflow
        - Blocking / critical for me

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I understand this repo does not accept application source code PRs
          required: true
