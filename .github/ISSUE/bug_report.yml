name: Bug Report
description: Report something broken in GLaunch
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve GLaunch. Please do **not** include wallet seed phrases, private keys, or API tokens.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal / GLA
        - Market
        - Wallet
        - My Launches
        - PnL Analytics
        - Auth / Login
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version (if known)
      placeholder: e.g. 0.1.0

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: wallet
    attributes:
      label: Wallet connected?
      options:
        - "Yes"
        - "No"
        - "Not applicable"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Drag and drop or paste links

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
